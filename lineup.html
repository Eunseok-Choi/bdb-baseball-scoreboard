<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>라인업 뷰어 - 가로 고정형</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; padding: 10px; }
        
        /* 스코어보드(360px)와 너비를 맞춤 */
        .lineup-container {
            width: 360px; 
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            padding: 10px 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 1px solid #444;
            
            /* 텍스트 스타일 */
            font-size: 17px; /* 기존 22px에서 축소 */
            font-weight: 700;
            white-space: pre; /* 공백(띄어쓰기)을 그대로 유지 */
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        #lineup-text {
            letter-spacing: -0.2px;
        }
    </style>
</head>
<body>

<div class="lineup-container">
    <span id="lineup-text">라인업 대기 중...</span>
</div>

<script>
    const MY_ID = 'jiho-papa-lineup-viewer'; 
    const peer = new Peer(MY_ID);

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            document.getElementById('lineup-text').innerText = data.text;
        });
    });
</script>
</body>
</html>
