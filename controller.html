<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>야구 리모컨</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #333; }
        .btn { font-size: 18px; padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; background: #007bff; color: white; }
        .btn:active { background: #0056b3; }
        .btn.red { background: #dc3545; }
        .btn.green { background: #28a745; }
        .btn-base { width: 60px; height: 60px; background: #ccc; border: 3px solid #999; transform: rotate(45deg); margin: 20px; color: black; font-weight: bold; }
        .btn-base.on { background: #FFD600; border-color: #E6C200; }
        .btn-base span { transform: rotate(-45deg); display: block; }
        .status { font-weight: bold; margin-bottom: 10px; }
        input { font-size: 16px; padding: 8px; width: 80%; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="conn-status" class="status" style="color: red;">상태: 방송 화면 연결 시도 중...</div>

<div class="card">
    <h3>팀 설정</h3>
    <input type="text" id="in-name-a" value="빅드림" oninput="send()"> <br>
    <input type="text" id="in-name-b" value="상대팀" oninput="send()">
</div>

<div class="card">
    <h3>점수 조작</h3>
    팀 A: <button class="btn" onclick="addScore('a', 1)">+</button> <button class="btn red" onclick="addScore('a', -1)">-</button> <br>
    팀 B: <button class="btn" onclick="addScore('b', 1)">+</button> <button class="btn red" onclick="addScore('b', -1)">-1</button>
</div>

<div class="card">
    <h3>베이스 (터치하여 변경)</h3>
    <div style="display: flex; justify-content: center; align-items: center; height: 150px;">
        <button id="btn-base2" class="btn-base" onclick="toggleBase(2)"><span>2루</span></button>
    </div>
    <div style="display: flex; justify-content: center; gap: 40px;">
        <button id="btn-base3" class="btn-base" onclick="toggleBase(3)"><span>3루</span></button>
        <button id="btn-base1" class="btn-base" onclick="toggleBase(1)"><span>1루</span></button>
    </div>
</div>

<div class="card">
    <h3>이닝 조작</h3>
    <button class="btn green" onclick="changeInning(1)">이닝 + (다음차례)</button>
    <button class="btn red" onclick="changeInning(-1)">이닝 - (이전차례)</button>
</div>

<div class="card">
    <h3>BSO 카운트</h3>
    B: <button class="btn" onclick="addBSO('b')">볼+</button> 
    S: <button class="btn" onclick="addBSO('s')">스트+</button> 
    O: <button class="btn" onclick="addBSO('o')">아웃+</button> <br>
    <button class="btn red" onclick="resetBSO()">카운트 초기화</button>
</div>

<script>
    const TARGET_ID = 'jiho-papa-live-viewer'; // viewer와 동일해야 함
    const peer = new Peer();
    let conn;

    let state = {
        nameA: '빅드림', nameB: '상대팀',
        scoreA: 0, scoreB: 0,
        inning: 1, isTop: true,
        base1: false, base2: false, base3: false,
        b: 0, s: 0, o: 0
    };

    peer.on('open', () => {
        connect();
    });

    function connect() {
        conn = peer.connect(TARGET_ID);
        conn.on('open', () => {
            document.getElementById('conn-status').innerText = "상태: 연결 성공! 제어 가능";
            document.getElementById('conn-status').style.color = "green";
            send();
        });
        conn.on('close', () => {
            document.getElementById('conn-status').innerText = "상태: 끊어짐. 재연결 중...";
            setTimeout(connect, 2000);
        });
    }

    function send() {
        state.nameA = document.getElementById('in-name-a').value;
        state.nameB = document.getElementById('in-name-b').value;
        if (conn && conn.open) conn.send(state);
    }

    function addScore(team, val) {
        if(team === 'a') state.scoreA = Math.max(0, state.scoreA + val);
        else state.scoreB = Math.max(0, state.scoreB + val);
        send();
    }

    function toggleBase(num) {
        state['base'+num] = !state['base'+num];
        document.getElementById('btn-base'+num).classList.toggle('on', state['base'+num]);
        send();
    }

    function addBSO(type) {
        state[type]++;
        if(type==='b' && state.b > 3) state.b = 0;
        if(type==='s' && state.s > 2) state.s = 0;
        if(type==='o' && state.o > 2) state.o = 0;
        send();
    }

    function resetBSO() {
        state.b = 0; state.s = 0; state.o = 0;
        send();
    }

    function changeInning(val) {
        if(val === 1) { // 다음
            if(state.isTop) state.isTop = false;
            else { state.isTop = true; state.inning++; }
        } else { // 이전
            if(!state.isTop) state.isTop = true;
            else { state.isTop = false; state.inning = Math.max(1, state.inning - 1); }
        }
        send();
    }
</script>
</body>
</html>
