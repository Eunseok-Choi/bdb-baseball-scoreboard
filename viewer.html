<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>야구 스코어보드 - 뷰어</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: 'Arial', sans-serif; color: white; }
        .main-container {
            display: flex; flex-direction: column; width: 600px;
            background: rgba(0, 0, 0, 0.8); border-radius: 15px; padding: 15px; margin: 20px;
        }
        /* 상단: 팀 이름 및 점수 */
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 20px; }
        .team-box { flex: 1; text-align: center; font-size: 24px; font-weight: bold; }
        .score-box { flex: 1; text-align: center; font-size: 48px; font-weight: bold; color: #FFD700; }

        /* 하단: 베이스, BSO, 이닝 */
        .info-row { display: flex; align-items: center; justify-content: space-around; }
        
        /* 베이스 (3개 다이아몬드) */
        .bases-container { position: relative; width: 100px; height: 80px; }
        .base { fill: none; stroke: white; stroke-width: 3; }
        .base.on { fill: #FFD600; stroke: #FFD600; }
        
        /* BSO 스택 */
        .bso-container { display: flex; flex-direction: column; gap: 5px; }
        .count-row { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 18px; }
        .dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; background: #555; }
        .dot.B.on { background: #4CAF50; border-color: #4CAF50; }
        .dot.S.on { background: #FFEB3B; border-color: #FFEB3B; }
        .dot.O.on { background: #F44336; border-color: #F44336; }

        /* 이닝 및 삼각형 */
        .inning-box { text-align: center; display: flex; align-items: center; gap: 10px; font-size: 30px; font-weight: bold; }
        .triangle { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; }
        .triangle.up { border-bottom: 25px solid #F44336; } /* 초 (공격) */
        .triangle.down { border-top: 25px solid #F44336; } /* 말 (공격) */
    </style>
</head>
<body>

<div class="main-container">
    <div class="score-row">
        <div class="team-box" id="name-a">팀 A</div>
        <div class="score-box"><span id="score-a">0</span> - <span id="score-b">0</span></div>
        <div class="team-box" id="name-b">팀 B</div>
    </div>

    <div class="info-row">
        <svg class="bases-container" viewBox="0 0 100 80">
            <polygon id="base2" class="base" points="50,5 65,25 50,45 35,25" /> <polygon id="base1" class="base" points="75,30 90,50 75,70 60,50" /> <polygon id="base3" class="base" points="25,30 40,50 25,70 10,50" /> </svg>

        <div class="bso-container">
            <div class="count-row">B <div id="b1" class="dot"></div> <div id="b2" class="dot"></div> <div id="b3" class="dot"></div></div>
            <div class="count-row">S <div id="s1" class="dot"></div> <div id="s2" class="dot"></div></div>
            <div class="count-row">O <div id="o1" class="dot"></div> <div id="o2" class="dot"></div></div>
        </div>

        <div class="inning-box">
            <span id="inning-num">1</span>
            <div id="inning-tri" class="triangle up"></div>
        </div>
    </div>
</div>

<script>
    // 본인의 고유한 ID를 만드세요 (영어+숫자 조합)
    const MY_ID = 'jiho-papa-live-viewer'; 
    const peer = new Peer(MY_ID);

    peer.on('open', (id) => console.log('연결 대기 중... ID:', id));

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            document.getElementById('name-a').innerText = data.nameA;
            document.getElementById('name-b').innerText = data.nameB;
            document.getElementById('score-a').innerText = data.scoreA;
            document.getElementById('score-b').innerText = data.scoreB;
            document.getElementById('inning-num').innerText = data.inning;
            
            // 이닝 화살표
            const tri = document.getElementById('inning-tri');
            tri.className = data.isTop ? 'triangle up' : 'triangle down';

            // 베이스
            document.getElementById('base1').classList.toggle('on', data.base1);
            document.getElementById('base2').classList.toggle('on', data.base2);
            document.getElementById('base3').classList.toggle('on', data.base3);

            // BSO
            for(let i=1; i<=3; i++) document.getElementById('b'+i)?.classList.toggle('on', data.b >= i);
            for(let i=1; i<=2; i++) document.getElementById('s'+i)?.classList.toggle('on', data.s >= i);
            for(let i=1; i<=2; i++) document.getElementById('o'+i)?.classList.toggle('on', data.o >= i);
        });
    });
</script>
</body>
</html>
