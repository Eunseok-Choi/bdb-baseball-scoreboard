<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>야구 스코어보드 - 뷰어</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: transparent; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        
        /* 스코어보드 고정 영역 */
        .main-container {
            width: 360px; /* 크기 고정 */
            background: rgba(0, 0, 0, 0.8); /* 불투명도 대폭 상승 */
            border-radius: 12px;
            padding: 12px;
            margin: 10px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            border: 1px solid #444;
        }

        /* 상단 점수 영역 */
        .score-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; }
        .team-box { flex: 1.5; text-align: center; font-size: 20px; font-weight: 800; letter-spacing: -1px; }
        .score-box { flex: 1; text-align: center; font-size: 36px; font-weight: 900; color: #FFD700; text-shadow: 2px 2px 4px black; }

        /* 하단 정보 영역 */
        .info-row { display: flex; align-items: center; justify-content: space-between; padding: 0 10px; }
        
        /* 조밀해진 베이스 */
        .bases-container { width: 100px; height: 100px; }
        .base { fill: none; stroke: #666; stroke-width: 3; transition: all 0.4s; }
        .base.on { fill: #FFD600; stroke: #FFD600; filter: drop-shadow(0 0 5px #FFD600); }
        
        /* 정밀해진 BSO */
        .bso-container { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; padding-left: 35px; }
        .count-row { display: flex; align-items: center; gap: 6px; font-weight: 900; font-size: 16px; }
        .label { width: 15px; }
        .dot { width: 18px; height: 18px; border-radius: 50%; background: #333; border: 1.5px solid #555; transition: 0.2s; }
        
        /* BSO 색상 규정 */
        .dot.B.on { background: #00FF41; border-color: #00FF41; box-shadow: 0 0 8px #00FF41; }
        .dot.S.on { background: #FFEB3B; border-color: #FFEB3B; box-shadow: 0 0 8px #FFEB3B; }
        .dot.O.on { background: #FF3B30; border-color: #FF3B30; box-shadow: 0 0 8px #FF3B30; }

        /* 이닝 및 삼각형 */
        .inning-box { width: 80px; text-align: center; display: flex; flex-direction: column; align-items: center; font-size: 22px; font-weight: 800; }
        .triangle { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; margin-top: 4px; }
        .triangle.up { border-bottom: 18px solid #FF3B30; } 
        .triangle.down { border-top: 18px solid #FF3B30; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="score-row">
        <div class="team-box" id="name-a">빅드림</div>
        <div class="score-box"><span id="score-a">0</span> : <span id="score-b">0</span></div>
        <div class="team-box" id="name-b">상대팀</div>
    </div>

    <div class="info-row">
        <svg class="bases-container" viewBox="0 0 100 80">
            <polygon id="base2" class="base" points="50,10 64,25 50,40 36,25" /> 
	    <polygon id="base1" class="base" points="72,32 86,47 72,62 58,47" /> 
            <polygon id="base3" class="base" points="28,32 42,47 28,62 14,47" /> </svg>

        <div class="bso-container">
            <div class="count-row"><span class="label">B</span> <div id="b1" class="dot B"></div> <div id="b2" class="dot B"></div> <div id="b3" class="dot B"></div></div>
            <div class="count-row"><span class="label">S</span> <div id="s1" class="dot S"></div> <div id="s2" class="dot S"></div></div>
            <div class="count-row"><span class="label">O</span> <div id="o1" class="dot O"></div> <div id="o2" class="dot O"></div></div>
        </div>

        <div class="inning-box">
            <span id="inning-num">1</span><div id="inning-tri" class="triangle up"></div>
        </div>
    </div>
</div>

<script>
    const MY_ID = 'jiho-papa-live-viewer'; 
    const peer = new Peer(MY_ID);

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            document.getElementById('name-a').innerText = data.nameA;
            document.getElementById('name-b').innerText = data.nameB;
            document.getElementById('score-a').innerText = data.scoreA;
            document.getElementById('score-b').innerText = data.scoreB;
            document.getElementById('inning-num').innerText = data.inning;
            document.getElementById('inning-tri').className = data.isTop ? 'triangle up' : 'triangle down';
            document.getElementById('base1').classList.toggle('on', data.base1);
            document.getElementById('base2').classList.toggle('on', data.base2);
            document.getElementById('base3').classList.toggle('on', data.base3);
            for(let i=1; i<=3; i++) document.getElementById('b'+i)?.classList.toggle('on', data.b >= i);
            for(let i=1; i<=2; i++) document.getElementById('s'+i)?.classList.toggle('on', data.s >= i);
            for(let i=1; i<=2; i++) document.getElementById('o'+i)?.classList.toggle('on', data.o >= i);
        });
    });
</script>
</body>
</html>
