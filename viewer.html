<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빅드림 스코어보드 - 뷰어</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* 프리즘 앱에서 투명하게 보이도록 배경 투명 처리 및 하단 고정 */
        body { margin: 0; font-family: 'Arial', sans-serif; background-color: transparent; position: fixed; bottom: 0; left: 0; width: 100%; }
        
        .bottom-bar {
            display: flex; height: 100px; /* 적당한 높이로 설정 */
            border-top: 2px solid #555;
            box-shadow: 0 -4px 8px rgba(0,0,0,0.5);
        }

        /* 왼쪽 타자 정보 섹션 (흰색 배경) */
        .section-batter {
            background-color: white; color: black;
            flex: 1; padding: 10px; display: flex; flex-direction: column; justify-content: center;
        }
        .batter-info { font-size: 1rem; margin-bottom: 5px; }
        .batter-result { font-size: 0.9rem; color: #555; }

        /* 중앙 팀 및 점수 섹션 (파란색, 노란색 배경) */
        .section-teams { display: flex; flex: 2; height: 100%; }
        .team { flex: 1; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-weight: bold; font-size: 1.3rem; }
        
        .home-team { background-color: #00bcd4; color: white; } /* 빅드림 */
        .away-team { background-color: #ffd600; color: black; } /* 상대팀 */
        
        .score { font-size: 2rem; font-weight: bold; }
        
        /* 오른쪽 카운트 및 베이스 섹션 (검은색 배경) */
        .section-count {
            background-color: black; color: white;
            flex: 2; padding: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .inning { font-size: 1.2rem; margin-right: 15px; }
        
        /* 베이스 현황 (다이아몬드 SVG 사용) */
        .bases-svg { width: 50px; height: 50px; margin-right: 15px; }
        .base { fill: transparent; stroke: #888; stroke-width: 2; }
        .base.filled { fill: #ffd600; stroke: #ffd600; } /* 차있는 베이스는 노란색 */
        
        /* BSO 카운트 (원형 SVG 사용) */
        .bso-container { display: flex; align-items: center; }
        .bso-svg { width: 30px; height: 30px; margin: 0 5px; }
        .count-circle { fill: transparent; stroke: white; stroke-width: 2; }
        .count-circle.filled-b { fill: #4CAF50; stroke: #4CAF50; } /* 볼 - 초록 */
        .count-circle.filled-s { fill: #ffeb3b; stroke: #ffeb3b; } /* 스트라이크 - 노랑 */
        .count-circle.filled-o { fill: #f44336; stroke: #f44336; } /* 아웃 - 빨강 */

    </style>
</head>
<body>

    <div class="bottom-bar">
        <div class="section-batter">
            <div class="batter-info" id="batter-info-display"></div>
            <div class="batter-result" id="batter-result-display"></div>
        </div>
        
        <div class="section-teams">
            <div class="team home-team">
                <span class="team-name">빅드림</span>
                <span class="score" id="score-home">0</span>
            </div>
            <div class="team away-team">
                <span class="score" id="score-away">0</span>
                <span class="team-name" id="away-name-display">상대팀</span>
            </div>
        </div>
        
        <div class="section-count">
            <div style="display: flex; align-items: center;">
                <span class="inning" id="inning-display">1회 초</span>
                
                <svg class="bases-svg" viewBox="0 0 100 100">
                    <polygon id="base-1" class="base" points="50,10 90,50 50,90 10,50"/> <polygon id="base-2" class="base" points="10,50 50,10 90,50 50,90"/> <polygon id="base-3" class="base" points="50,90 10,50 50,10 90,50"/> </svg>
            </div>
            
            <div class="bso-container">
                B 
                <svg class="bso-svg" viewBox="0 0 40 40"><circle id="b-1" class="count-circle" cx="20" cy="20" r="18"/></svg>
                <svg class="bso-svg" viewBox="0 0 40 40"><circle id="b-2" class="count-circle" cx="20" cy="20" r="18"/></svg>
                <svg class="bso-svg" viewBox="0 0 40 40"><circle id="b-3" class="count-circle" cx="20" cy="20" r="18"/></svg>
                <span style="margin: 0 10px;"></span>
                S
                <svg class="bso-svg" viewBox="0 0 40 40"><circle id="s-1" class="count-circle" cx="20" cy="20" r="18"/></svg>
                <svg class="bso-svg" viewBox="0 0 40 40"><circle id="s-2" class="count-circle" cx="20" cy="20" r="18"/></svg>
                <span style="margin: 0 10px;"></span>
                O
                <svg class="bso-svg" viewBox="0 0 40 40"><circle id="o-1" class="count-circle" cx="20" cy="20" r="18"/></svg>
                <svg class="bso-svg" viewBox="0 0 40 40"><circle id="o-2" class="count-circle" cx="20" cy="20" r="18"/></svg>
            </div>
        </div>
    </div>

    <script>
        // 고유 ID를 지정하여 컨트롤러가 쉽게 찾아올 수 있도록 설정 (고유한 값으로 변경 가능)
        const peer = new Peer('bigdream-baseball-viewer-v2'); 

        peer.on('open', (id) => {
            console.log('뷰어 대기 중. ID: ' + id);
        });

        // 컨트롤러(리모컨)로부터 데이터가 들어오면 화면 업데이트
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                // 타자 정보
                document.getElementById('batter-info-display').innerText = data.batterInfo;
                document.getElementById('batter-result-display').innerText = data.batterResult;
                
                // 팀 점수 및 이름
                document.getElementById('score-home').innerText = data.home;
                document.getElementById('score-away').innerText = data.away;
                document.getElementById('away-name-display').innerText = data.awayName;
                
                // 이닝
                document.getElementById('inning-display').innerText = data.inning;
                
                // 베이스 현황 업데이트
                document.getElementById('base-1').className.baseVal = data.runner1 ? 'base filled' : 'base';
                document.getElementById('base-2').className.baseVal = data.runner2 ? 'base filled' : 'base';
                document.getElementById('base-3').className.baseVal = data.runner3 ? 'base filled' : 'base';
                
                // BSO 카운트 업데이트
                updateCountDisplay('b', data.ball, 3);
                updateCountDisplay('s', data.strike, 2);
                updateCountDisplay('o', data.out, 2);
            });
        });
        
        // 카운트 표시를 업데이트하는 공통 함수
        function updateCountDisplay(idPrefix, count, max) {
            for (let i = 1; i <= max; i++) {
                const elementId = `${idPrefix}-${i}`;
                const element = document.getElementById(elementId);
                if (element) {
                    if (i <= count) {
                        element.className.baseVal = `count-circle filled-${idPrefix}`;
                    } else {
                        element.className.baseVal = 'count-circle';
                    }
                }
            }
        }
    </script>
</body>
</html>
